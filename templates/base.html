<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Placement Portal{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f4f7f9; /* Soft grey for a professional feel */
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        .navbar-academic {
            background-color: #003366; /* Deep Navy Blue */
            border-bottom: 3px solid #ffc107; /* Subtle gold accent */
        }
        .main-wrapper {
            flex: 1;
        }
        .content-card {
            background: white;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            padding: 30px;
            margin-top: 20px;
            border: 1px solid #e3e6f0;
        }
        footer {
            padding: 20px 0;
            font-size: 0.9rem;
            color: #6c757d;
            background: #fff;
            border-top: 1px solid #dee2e6;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-academic shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                PLACEMENT PORTAL
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="/">Home</a></li>
                </ul>
            </div>
        </div>
    </nav>
    <div class="container main-wrapper mb-5">
        <div class="row justify-content-center">
            <div class="col-lg-10">
                <div class="mt-4">
                    {% with messages=get_flashed_messages(with_categories=true) %}
                      {% if messages %}
                        {% for category, message in messages %}
                          <div class="alert alert-{{ category }} alert-dismissible fade show shadow-sm" role="alert">
                            {{ message }}
                            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                          </div>
                        {% endfor %}
                      {% endif %}
                    {% endwith %}
                </div>
                <div class="content-card">
                    {% block content %}{% endblock %}
                </div>
            </div>
        </div>
    </div>
    <footer class="text-center">
        <div class="container">
            <p class="mb-0">&copy; 2026 University Placement Cell. All Rights Reserved.</p>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
