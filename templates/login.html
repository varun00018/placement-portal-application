{% extends "base.html" %}

{% block title %}Login - Placement Portal{% endblock %}

{% block content %}
<div class="row justify-content-center py-4">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <h2 class="fw-bold text-dark">Portal Login</h2>
            <p class="text-muted small text-uppercase fw-semibold">University Placement Cell</p>
        </div>
        <form action="{{ url_for('login') }}" method="POST">
            <div class="form-floating mb-3">
                <input type="email" name="email" class="form-control" id="emailInput" placeholder="name@university.edu" required autofocus>
                <label for="emailInput">Email Address</label>
            </div>
            <div class="form-floating mb-4">
                <input type="password" name="password" class="form-control" id="passwordInput" placeholder="Password" required>
                <label for="passwordInput">Password</label>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-2 fw-bold shadow-sm mb-3" style="background-color: #003366; border: none;">
                Sign In
            </button>
            <div class="text-center mt-4 pt-3 border-top">
                <p class="small text-muted mb-2">Need an account?</p>
                <div class="d-grid gap-2 d-md-block">
                    <a href="{{ url_for('student_registration') }}" class="btn btn-outline-secondary btn-sm me-md-1">Student Register</a>
                    <a href="{{ url_for('company_registration') }}" class="btn btn-outline-secondary btn-sm">Company Register</a>
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
