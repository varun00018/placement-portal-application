{% extends "base.html" %}

{% block title %}Update Profile - Student{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
            <div>
                <h3 class="fw-bold text-dark mb-0">Update Professional Details</h3>
            </div>
            <a href="/student/view_profile" class="btn btn-outline-secondary btn-sm">
                <i class="bi bi-person-circle"></i> View Profile
            </a>
        </div>
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Academic Standing</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-graph-up-arrow text-primary"></i>
                            </span>
                            <div class="form-floating flex-grow-1">
                                <input name="cgpa" type="number" step="0.01" class="form-control border-start-0" id="floatCGPA" 
                                       value="{{ profile.cgpa }}" placeholder="Current CGPA" required>
                                <label for="floatCGPA">Current CGPA</label>
                            </div>
                        </div>
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Technical Expertise</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-tools text-primary"></i>
                            </span>
                            <div class="form-floating flex-grow-1">
                                <textarea name="skills" class="form-control border-start-0" id="floatSkills" 
                                          style="height: 100px" placeholder="Skills">{{ profile.skills }}</textarea>
                                <label for="floatSkills">Key Skills (Comma separated)</label>
                            </div>
                        </div>
                        <div class="form-text mt-1">Example: Python, SQL, Machine Learning, AWS</div>
                    </div>
                    <div class="mb-5">
                        <label class="form-label fw-bold text-secondary small text-uppercase">Resume</label>
                        <div class="input-group">
                            <span class="input-group-text bg-white border-end-0">
                                <i class="bi bi-link-45deg text-primary"></i>
                            </span>
                            <div class="form-floating flex-grow-1">
                                <input name="resume_link" type="url" class="form-control border-start-0" id="floatResume" 
                                       value="{{ profile.resume_link }}" placeholder="Resume Link">
                                <label for="floatResume">Public Resume Link (Google Drive / LinkedIn)</label>
                            </div>
                        </div>
                        <div class="form-text mt-1 text-info">
                            <i class="bi bi-info-circle me-1"></i> Make sure the link sharing is set to "Anyone with the link can view".
                        </div>
                    </div>
                    <div class="d-grid gap-2 d-md-flex justify-content-md-end border-top pt-4">
                        <button type="reset" class="btn btn-light px-4">Discard Changes</button>
                        <button type="submit" class="btn btn-primary px-5 fw-bold shadow-sm">
                            Save Profile Changes
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
<style>
    .form-control:focus {
        border-color: #0d6efd;
        box-shadow: none;
    }
    .input-group:focus-within .input-group-text {
        border-color: #0d6efd;
        color: #0d6efd !important;
    }
</style>
{% endblock %}
